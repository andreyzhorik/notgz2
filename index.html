<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Go to My Site</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      font-family: Arial, sans-serif;
    }

    .big-button {
      padding: 30px 60px;
      font-size: 32px;
      font-weight: bold;
      color: white;
      background: #111827;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .big-button:hover {
      transform: scale(1.08);
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .big-button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <a class="big-button" href="https://sites.google.com/mymail.lausd.net/notgz2">
    🚀 GO TO MY SITE
  </a>

</body>
</html>
